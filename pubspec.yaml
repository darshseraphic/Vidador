name: vidador
description: "Strict ultra minimalistic discipline and biometric tracking engine."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # DATA PERSISTENCE MANAGEMENT
  hive_flutter: ^1.1.0

  # APPLICATION STATE PIPELINE
  flutter_riverpod: ^2.5.1

  # UTILITIES AND EXTERNAL LINK ROUTING
  intl: ^0.19.0
  url_launcher: ^6.3.1
  google_fonts: ^8.1.0
  pedometer: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true