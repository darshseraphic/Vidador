name: vidador
description: "Strict ultra minimalistic discipline and biometric tracking engine."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  google_fonts: ^8.1.0
  pedometer: ^4.2.0
  permission_handler: ^12.0.3 # <-- EXPLICIT SYSTEM PERMISSION ACCESS PIECE

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

# EXPLICIT TOP-LEVEL AUTOMATION METRICS
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.png"
  remove_alpha_ios: true

# ULTRA-MINIMAL PLAIN BLACK NATIVE SPLASH ENGINE
flutter_native_splash:
  color: "#000000"
  fullscreen: true
  # Removing the 'image' property completely ensures a completely plain dark canvas
  android_12:
    color: "#000000"